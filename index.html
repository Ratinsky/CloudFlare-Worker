<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Notion Fetch Test</title>
</head>
<body>
  <h2>Test Notion Worker</h2>

  <input id="db" placeholder="Database ID" style="width:300px;" />
  <button onclick="loadData()">Load</button>

  <pre id="out"></pre>

  <script>
    async function loadData() {
      const db = document.getElementById("db").value;

      if (!db) {
        document.getElementById("out").innerText = "Enter database ID";
        return;
      }

      const url = `https://lively-king-24e3.aratinskii.workers.dev/?db=${db}`;

      try {
        const res = await fetch(url);

        const text = await res.text();

        document.getElementById("out").innerText = text;
      } catch (e) {
        document.getElementById("out").innerText =
          "Fetch error: " + e.message;
      }
    }
  </script>
</body>
</html>
